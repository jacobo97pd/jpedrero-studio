      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav" aria-label="Navegacion principal">
        <a href="index.html">Obras</a>

      </nav>

  <main class="page-main">
    <section class="container page-hero">
      <p class="kicker">Galeria</p>
      <h1>Obras</h1>
      <p>Coleccion completa en formato digital con vista limpia y ficha individual de cada pieza.</p>
    </section>

    <section class="container grid works-grid" id="worksGrid"></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js?v=20260426-3"></script>
  <script>
    (async function () {
      const lang = localStorage.getItem('jps_lang') === 'en' ? 'en' : 'es';
      const fallbackWorks = [
        {
          id: 'cuadro1',
          title: 'Retrato Carmesi',
          year: 2025,
          technique: 'Tecnica mixta',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro1.png',
          renderImage: 'assets/blenders/retrato.jpeg',
          description: 'Retrato contemporaneo de atmosfera calida y gestualidad suelta. La composicion trabaja veladuras y contrastes suaves para dirigir la mirada al gesto y a la expresion, con una construccion cromatica en capas que aporta profundidad y presencia en interior.',
          featured: true
        },
        {
          id: 'cuadro2',
          title: 'Barco azul',
          year: 2024,
          technique: 'Tecnica mixta',
          size: '60x60 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro3.png',
          featured: true
        },
        {
          id: 'cuadro3',
          title: 'Orilla al atardecer',
          year: 2025,
          technique: 'Pastel',
          size: '70x100 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro2.png',
          featured: true
        },
        {
          id: 'cuadro4',
          title: 'London Eye',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '80x60 cm',
          status: 'Serie limitada',
          image: 'assets/img/works/Cuadro4.png',
          renderImage: 'assets/blenders/londoeye.jpeg',
          description: 'Paisaje urbano nocturno con fuerte presencia cromatica. La rueda y sus reflejos estructuran la tension visual de la pieza, mientras la figura en primer plano introduce narrativa y escala humana. La superficie combina capas opacas y transparencias para reforzar el ambiente de noche.',
          featured: true
        },
        {
          id: 'cuadro5',
          title: 'Caballos',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '60x80 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro5.png',
          featured: true
        },
        {
          id: 'cuadro6',
          title: 'El Padrino',
          year: 2026,
          technique: 'Pastel',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro6.png',
          featured: true
        },
        {
          id: 'cuadro7',
          title: 'Luz Interna',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/luz_interna.png',
          renderImage: 'assets/blenders/luz_interna.png',
          description: 'Figura femenina en movimiento capturada a traves de un lenguaje expresionista y visceral. La obra explora el cuerpo no como forma estatica, sino como vehiculo de energia, donde la luz representada en amarillos y verdes vibrantes irrumpe sobre una base mas contenida, generando contraste y tension visual. La pincelada es directa, casi impulsiva, dejando visibles las decisiones del artista y reforzando la sensacion de inmediatez. Las zonas sin resolver conviven con otras mas definidas, creando un equilibrio entre lo figurativo y lo abstracto. El fondo neutro actua como contenedor, permitiendo que la figura respire y se proyecte hacia el espectador, mientras la composicion sugiere un instante suspendido entre calma y movimiento. Una pieza que no busca perfeccion academica, sino transmitir presencia, emocion y caracter.',
          featured: true
        },
        {
          id: 'cuadro8',
          title: 'Rayo Verde',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/rayo_verde.jpeg',
          renderImage: 'assets/blenders/rayo_verde_blender.png',
          description: 'Composicion materica dominada por azules profundos y veladuras frias, atravesada por una pequena embarcacion que emerge como punto de tension narrativa. La obra explora la escala entre inmensidad y fragilidad, situando al espectador frente a una escena donde el vacio tambien actua como lenguaje. La superficie presenta una pincelada espesa y decidida, con relieves visibles que capturan la luz de forma irregular y aportan fisicidad al color. Las transiciones tonales entre turquesas, cobaltos y blancos quebrados sugieren agua en movimiento y una atmosfera inestable. El foco central, de trazo mas sintetico, condensa la energia del cuadro y equilibra el campo abstracto que lo rodea. Una pieza de fuerte pulso gestual que combina presencia plastica y lectura simbolica.',
          featured: true
        },
        {
          id: 'cuadro9',
          title: 'Honda CRX',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/honda_crx.jpeg',
          renderImage: 'assets/blenders/honda_crx_blender.png',
          description: 'Obra de lenguaje minimalista construida sobre un gran campo cian de materia espesa, donde un pequeno Honda CRX aparece aislado como unico anclaje figurativo. El contraste entre escala monumental del fondo y escala diminuta del motivo central activa una lectura de silencio, distancia y memoria. La textura, aplicada en capas horizontales y bordes cargados, deja visible el gesto y la huella del proceso. Esta materialidad convierte el color en protagonista y desplaza la narrativa hacia una experiencia casi contemplativa. Lejos de una representacion literal, la pieza funciona como sintesis: objeto, espacio y tiempo quedan comprimidos en una imagen de aparente simplicidad, pero de alta carga emocional y conceptual.',
          featured: true
        },
        {
          id: 'cuadro10',
          title: 'Travesia Ignea',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/travesia_ignea.jpeg',
          renderImage: 'assets/blenders/travesia_ignea_blender.png',
          description: 'Pieza de alto contraste cromatico donde una embarcacion oscura atraviesa un entorno de luz incendiada. Amarillos, naranjas y azules se enfrentan en capas superpuestas para construir una escena de tension entre calma aparente y energia latente. La figura del barco, tratada con volumen sobrio y contorno firme, funciona como eje estructural dentro de un fondo vibrante y atmosferico. Los reflejos sobre el agua amplifican el movimiento visual y extienden la intensidad luminica hacia la base de la composicion. La obra propone una narrativa abierta de desplazamiento y resistencia, apoyada en una pincelada expresiva que privilegia emocion, ritmo y presencia pictorica.',
          featured: true
        }
      ];
      const titleMap = {
        cuadro1: { es: 'Retrato Carmesi', en: 'Crimson Portrait' },
        cuadro2: { es: 'Barco azul', en: 'Blue Ship' },
        cuadro3: { es: 'Orilla al atardecer', en: 'Shore at Dusk' },
        cuadro4: { es: 'London Eye', en: 'London Eye' },
        cuadro5: { es: 'Caballos', en: 'Horses' },
        cuadro6: { es: 'El Padrino', en: 'The Godfather' },
        cuadro7: { es: 'Luz Interna', en: 'Inner Light' },
        cuadro8: { es: 'Rayo Verde', en: 'Green Ray' },
        cuadro9: { es: 'Honda CRX', en: 'Honda CRX' },
        cuadro10: { es: 'Travesia Ignea', en: 'Igneous Crossing' }
      };
      const techniqueMap = {
        'Pastel': { es: 'Pastel', en: 'Pastel' },
        'Tecnica mixta': { es: 'Tecnica mixta', en: 'Mixed media' }
      };
      const statusMap = {
        'Disponible': { es: 'Disponible', en: 'Available' }
      };

      function tValue(map, key) {
        return (map[key] && map[key][lang]) || key;
      }

      async function loadWorks() {
        if (window.location.protocol === 'file:') {
          return fallbackWorks;
        }

        try {
          const res = await fetch('../data/works.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (Array.isArray(data) && data.length) return data;
        } catch (error) {
          console.warn('[Works] No se pudo cargar works.json, uso fallback local.', error);
        }

        return fallbackWorks;
      }

      const wrap = document.getElementById('worksGrid');
      if (!wrap) return;

      const works = await loadWorks();

      wrap.innerHTML = works.map(w => `
        <a class="card" href="obra.html?id=${encodeURIComponent(w.id)}">
          <img src="../${w.image}" alt="${tValue(titleMap, w.id)}" loading="lazy" />
          <div class="card-meta">
            <span class="card-title">${tValue(titleMap, w.id)}</span>
            <span class="card-sub">${w.year} &middot; ${tValue(techniqueMap, w.technique)} &middot; ${w.size} &middot; ${tValue(statusMap, w.status)}</span>
          </div>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
