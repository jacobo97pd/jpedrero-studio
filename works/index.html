<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Obras | J. Pedrero Studio</title>
  <meta name="description" content="Galeria completa de obras originales." />
  <meta name="theme-color" content="#f6f6f4" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/site/icon-jp.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="../index.html" aria-label="Inicio">
        <span class="brand-main">J. PEDRERO</span>
        <span class="brand-sub">Studio</span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav" aria-label="Navegacion principal">
        <a href="index.html">Obras</a>
        <a href="../visualizer/index.html">Visualizador</a>
        <a href="../museum/index.html">Museo</a>
        <a href="../collections/index.html">Colecciones</a>
        <a href="../about/index.html">Sobre</a>
        <a href="../commissions/index.html">Encargos</a>
        <a class="nav-cta" href="../contact/index.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="container page-hero">
      <p class="kicker">Galeria</p>
      <h1>Obras</h1>
      <p>Coleccion completa en formato digital con vista limpia y ficha individual de cada pieza.</p>
    </section>

    <section class="container grid works-grid" id="worksGrid"></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js?v=20260405-1"></script>
  <script>
    (async function () {
      const lang = localStorage.getItem('jps_lang') === 'en' ? 'en' : 'es';
      const fallbackWorks = [
        {
          id: 'cuadro2',
          title: 'Barco azul',
          year: 2024,
          technique: 'Tecnica mixta',
          size: '60x60 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro3.png',
          featured: true
        },
        {
          id: 'cuadro3',
          title: 'Orilla al atardecer',
          year: 2025,
          technique: 'Pastel',
          size: '70x100 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro2.png',
          featured: true
        },
        {
          id: 'cuadro5',
          title: 'Caballos',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '60x80 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro5.png',
          featured: true
        },
        {
          id: 'cuadro6',
          title: 'El Padrino',
          year: 2026,
          technique: 'Pastel',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro6.png',
          featured: true
        }
      ];
      const hiddenWorkIds = new Set(['cuadro1', 'cuadro4']);
      const titleMap = {
        cuadro2: { es: 'Barco azul', en: 'Blue Ship' },
        cuadro3: { es: 'Orilla al atardecer', en: 'Shore at Dusk' },
        cuadro5: { es: 'Caballos', en: 'Horses' },
        cuadro6: { es: 'El Padrino', en: 'The Godfather' }
      };
      const techniqueMap = {
        'Pastel': { es: 'Pastel', en: 'Pastel' },
        'Tecnica mixta': { es: 'Tecnica mixta', en: 'Mixed media' }
      };
      const statusMap = {
        'Disponible': { es: 'Disponible', en: 'Available' }
      };

      function tValue(map, key) {
        return (map[key] && map[key][lang]) || key;
      }

      async function loadWorks() {
        if (window.location.protocol === 'file:') {
          return fallbackWorks;
        }

        try {
          const res = await fetch('../data/works.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (Array.isArray(data) && data.length) return data;
        } catch (error) {
          console.warn('[Works] No se pudo cargar works.json, uso fallback local.', error);
        }

        return fallbackWorks;
      }

      const wrap = document.getElementById('worksGrid');
      if (!wrap) return;

      const works = (await loadWorks()).filter((w) => !hiddenWorkIds.has(w.id));

      wrap.innerHTML = works.map(w => `
        <a class="card" href="obra.html?id=${encodeURIComponent(w.id)}">
          <img src="../${w.image}" alt="${tValue(titleMap, w.id)}" loading="lazy" />
          <div class="card-meta">
            <span class="card-title">${tValue(titleMap, w.id)}</span>
            <span class="card-sub">${w.year} &middot; ${tValue(techniqueMap, w.technique)} &middot; ${w.size} &middot; ${tValue(statusMap, w.status)}</span>
          </div>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
