<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Obras | J. Pedrero Studio</title>
  <meta name="description" content="Galeria completa de obras originales." />
  <meta name="theme-color" content="#f6f6f4" />
  <link rel="icon" type="image/png" href="../assets/img/site/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="../index.html" aria-label="Inicio">
        <span class="brand-main">J. PEDRERO</span>
        <span class="brand-sub">Studio</span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav" aria-label="Navegacion principal">
        <a href="index.html">Obras</a>
        <a href="../collections/index.html">Colecciones</a>
        <a href="../about/index.html">Sobre</a>
        <a href="../commissions/index.html">Encargos</a>
        <a class="nav-cta" href="../contact/index.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="container page-hero">
      <p class="kicker">Galeria</p>
      <h1>Obras</h1>
      <p>Coleccion completa en formato digital con vista limpia y ficha individual de cada pieza.</p>
    </section>

    <section class="container grid works-grid" id="worksGrid"></section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    (async function () {
      const wrap = document.getElementById('worksGrid');
      if (!wrap) return;

      const res = await fetch('../data/works.json');
      const works = await res.json();

      wrap.innerHTML = works.map(w => `
        <a class="card" href="obra.html?id=${encodeURIComponent(w.id)}">
          <img src="../${w.image}" alt="${w.title}" loading="lazy" />
          <div class="card-meta">
            <span class="card-title">${w.title}</span>
            <span class="card-sub">${w.year} &middot; ${w.technique} &middot; ${w.size} &middot; ${w.status}</span>
          </div>
        </a>
      `).join('');
    })();
  </script>
</body>
</html>
