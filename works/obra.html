<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Obra | J. Pedrero Studio</title>
  <meta name="theme-color" content="#f6f6f4" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/site/icon-jp.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="module" src="../assets/js/vendor/model-viewer.min.js"></script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="../index.html" aria-label="Inicio">
        <span class="brand-main">J. PEDRERO</span>
        <span class="brand-sub">Studio</span>
      </a>
      <a class="nav-cta" href="index.html">Volver a obras</a>
    </div>
  </header>

  <main class="page-main">
    <section class="container page-grid">
      <figure class="hero-art" id="workImageBox">
        <img id="workImage" src="../assets/img/works/Cuadro1.png" alt="Obra" />
        <div class="work-model-wrap" id="workModelWrap" hidden>
          <model-viewer
            id="workModel"
            camera-controls
            loading="eager"
            camera-orbit="210deg 82deg 125%"
            min-camera-orbit="auto 65deg 80%"
            max-camera-orbit="auto 95deg 220%"
            shadow-intensity="0"
            exposure="1"
            ar="false"
            interaction-prompt="none">
          </model-viewer>
        </div>
      </figure>

      <article class="page-box" id="workInfo">
        <p class="kicker">Ficha</p>
        <h2 id="workTitle">Obra</h2>
        <p id="workMeta">Tecnica &middot; Medidas &middot; Estado</p>
        <p class="meta" id="workYear">2026</p>
        <p>Para disponibilidad y precio, solicita informacion por contacto directo.</p>
        <a class="btn" href="../contact/index.html">Solicitar informacion</a>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js?v=20260331-6"></script>
  <script>
    (async function () {
      const lang = localStorage.getItem('jps_lang') === 'en' ? 'en' : 'es';
      const fallbackWorks = [
        {
          id: 'cuadro1',
          title: 'Retrato en carmin',
          year: 2025,
          technique: 'Pastel',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro1.png',
          featured: true
        },
        {
          id: 'cuadro2',
          title: 'Barco azul',
          year: 2024,
          technique: 'Tecnica mixta',
          size: '60x60 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro3.png',
          featured: true
        },
        {
          id: 'cuadro3',
          title: 'Orilla al atardecer',
          year: 2025,
          technique: 'Pastel',
          size: '70x100 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro2.png',
          featured: true
        },
        {
          id: 'cuadro4',
          title: 'London Eye',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '80x60 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro4.png',
          featured: true
        },
        {
          id: 'cuadro5',
          title: 'Caballos',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '60x80 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro5.png',
          featured: true
        },
        {
          id: 'cuadro6',
          title: 'El Padrino',
          year: 2026,
          technique: 'Pastel',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro6.png',
          featured: true
        }
      ];
      const titleMap = {
        cuadro1: { es: 'Retrato en carmin', en: 'Crimson Portrait' },
        cuadro2: { es: 'Barco azul', en: 'Blue Ship' },
        cuadro3: { es: 'Orilla al atardecer', en: 'Shore at Dusk' },
        cuadro4: { es: 'London Eye', en: 'London Eye' },
        cuadro5: { es: 'Caballos', en: 'Horses' },
        cuadro6: { es: 'El Padrino', en: 'The Godfather' }
      };
      const modelMap = {
        cuadro1: {
          model: '../assets/blenders/cuadro_retrato_3d.glb?v=1'
        },
        cuadro2: {
          model: '../assets/blenders/cuadro_barco_3d.glb?v=1'
        },
        cuadro3: {
          model: '../assets/blenders/cuadro_atardecer_3d.glb?v=1'
        },
        cuadro4: {
          model: '../assets/blenders/cuadro_london_eye_3d.glb?v=1'
        },
        cuadro5: {
          model: '../assets/blenders/cuadro_caballos_3d_front.glb?v=1'
        },
        cuadro6: {
          model: '../assets/blenders/cuadro_retrato_3d.glb?v=1',
          texture: '../assets/blenders/cuadro6.png'
        }
      };
      const techniqueMap = {
        'Pastel': { es: 'Pastel', en: 'Pastel' },
        'Tecnica mixta': { es: 'Tecnica mixta', en: 'Mixed media' }
      };
      const statusMap = {
        'Disponible': { es: 'Disponible', en: 'Available' }
      };
      function tValue(map, key) {
        return (map[key] && map[key][lang]) || key;
      }

      async function loadWorks() {
        if (window.location.protocol === 'file:') {
          return fallbackWorks;
        }

        try {
          const res = await fetch('../data/works.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (Array.isArray(data) && data.length) return data;
        } catch (error) {
          console.warn('[Work] No se pudo cargar works.json, uso fallback local.', error);
        }

        return fallbackWorks;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const works = await loadWorks();
      const work = works.find(w => w.id === id) || works[0];
      if (!work) return;

      const localizedTitle = tValue(titleMap, work.id);
      const localizedTechnique = tValue(techniqueMap, work.technique);
      const localizedStatus = tValue(statusMap, work.status);

      document.getElementById('workTitle').textContent = localizedTitle;
      document.getElementById('workMeta').textContent = `${localizedTechnique} - ${work.size} - ${localizedStatus}`;
      document.getElementById('workYear').textContent = String(work.year);

      const img = document.getElementById('workImage');
      const modelWrap = document.getElementById('workModelWrap');
      const modelViewer = document.getElementById('workModel');
      img.src = `../${work.image}`;
      img.alt = localizedTitle;

      const modelConfig = modelMap[work.id];
      if (modelConfig && img) {
        // Mantiene la imagen visible en la ficha y deja el 3D para la lupa.
        img.dataset.modelSrc = modelConfig.model;
        if (modelConfig.texture) img.dataset.modelTexture = modelConfig.texture;
        img.dataset.modelCameraOrbit = '210deg 82deg 125%';
        img.dataset.modelMinCameraOrbit = 'auto 65deg 80%';
        img.dataset.modelMaxCameraOrbit = 'auto 95deg 220%';
      }

      if (modelWrap) modelWrap.hidden = true;
      if (modelViewer) {
        modelViewer.removeAttribute('src');
        modelViewer.removeAttribute('poster');
      }
      img.style.removeProperty('display');
    })();
  </script>
</body>
</html>
