<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Obra | J. Pedrero Studio</title>
  <meta name="theme-color" content="#f6f6f4" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/site/icon-jp.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="module" src="../assets/js/vendor/model-viewer.min.js"></script>
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="../index.html" aria-label="Inicio">
        <span class="brand-main">J. PEDRERO</span>
        <span class="brand-sub">Studio</span>
      </a>
      <a class="nav-cta" href="index.html">Volver a obras</a>
    </div>
  </header>

  <main class="page-main">
    <section class="container page-grid">
      <figure class="hero-art" id="workImageBox">
        <img id="workImage" src="../assets/img/works/Cuadro3.png" alt="Obra" />
        <div class="work-model-wrap" id="workModelWrap" hidden>
          <model-viewer
            id="workModel"
            camera-controls
            loading="eager"
            camera-orbit="210deg 82deg 125%"
            min-camera-orbit="auto 65deg 80%"
            max-camera-orbit="auto 95deg 220%"
            shadow-intensity="0"
            exposure="1"
            ar="false"
            interaction-prompt="none">
          </model-viewer>
        </div>
      </figure>

      <article class="page-box" id="workInfo">
        <p class="kicker">Ficha</p>
        <h2 id="workTitle">Obra</h2>
        <p id="workMeta">Tecnica &middot; Medidas &middot; Estado</p>
        <p class="meta" id="workYear">2026</p>
        <div class="work-description" id="workDescription"></div>
        <p>Para disponibilidad y precio, solicita informacion por contacto directo.</p>
        <a class="btn" href="../contact/index.html">Solicitar informacion</a>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js?v=20260424-2"></script>
  <script>
    (async function () {
      const lang = localStorage.getItem('jps_lang') === 'en' ? 'en' : 'es';
      const fallbackWorks = [
        {
          id: 'cuadro2',
          title: 'Barco azul',
          year: 2024,
          technique: 'Tecnica mixta',
          size: '60x60 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro3.png',
          featured: true
        },
        {
          id: 'cuadro3',
          title: 'Orilla al atardecer',
          year: 2025,
          technique: 'Pastel',
          size: '70x100 cm',
          status: 'Disponible',
          image: 'assets/img/works/Cuadro2.png',
          featured: true
        },
        {
          id: 'cuadro5',
          title: 'Caballos',
          year: 2026,
          technique: 'Tecnica mixta',
          size: '60x80 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro5.png',
          featured: true
        },
        {
          id: 'cuadro6',
          title: 'El Padrino',
          year: 2026,
          technique: 'Pastel',
          size: '50x70 cm',
          status: 'Disponible',
          image: 'assets/img/works/cuadro6.png',
          featured: true
        },
        {
          id: 'cuadro7',
          title: 'Luz Interna',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/luz_interna.png',
          renderImage: 'assets/blenders/luz_interna.png',
          description: 'Figura femenina en movimiento capturada a traves de un lenguaje expresionista y visceral. La obra explora el cuerpo no como forma estatica, sino como vehiculo de energia, donde la luz representada en amarillos y verdes vibrantes irrumpe sobre una base mas contenida, generando contraste y tension visual.\n\nLa pincelada es directa, casi impulsiva, dejando visibles las decisiones del artista y reforzando la sensacion de inmediatez. Las zonas sin resolver conviven con otras mas definidas, creando un equilibrio entre lo figurativo y lo abstracto.\n\nEl fondo neutro actua como contenedor, permitiendo que la figura respire y se proyecte hacia el espectador, mientras la composicion sugiere un instante suspendido entre calma y movimiento.\n\nUna pieza que no busca perfeccion academica, sino transmitir presencia, emocion y caracter.',
          featured: true
        },
        {
          id: 'cuadro8',
          title: 'Rayo Verde',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/rayo_verde.jpeg',
          renderImage: 'assets/blenders/rayo_verde_blender.png',
          description: 'Composicion materica dominada por azules profundos y veladuras frias, atravesada por una pequena embarcacion que emerge como punto de tension narrativa. La obra explora la escala entre inmensidad y fragilidad, situando al espectador frente a una escena donde el vacio tambien actua como lenguaje.\n\nLa superficie presenta una pincelada espesa y decidida, con relieves visibles que capturan la luz de forma irregular y aportan fisicidad al color. Las transiciones tonales entre turquesas, cobaltos y blancos quebrados sugieren agua en movimiento y una atmosfera inestable.\n\nEl foco central, de trazo mas sintetico, condensa la energia del cuadro y equilibra el campo abstracto que lo rodea. Una pieza de fuerte pulso gestual que combina presencia plastica y lectura simbolica.',
          featured: true
        },
        {
          id: 'cuadro9',
          title: 'Honda CRX',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/honda_crx.jpeg',
          renderImage: 'assets/blenders/honda_crx_blender.png',
          description: 'Obra de lenguaje minimalista construida sobre un gran campo cian de materia espesa, donde un pequeno Honda CRX aparece aislado como unico anclaje figurativo. El contraste entre escala monumental del fondo y escala diminuta del motivo central activa una lectura de silencio, distancia y memoria.\n\nLa textura, aplicada en capas horizontales y bordes cargados, deja visible el gesto y la huella del proceso. Esta materialidad convierte el color en protagonista y desplaza la narrativa hacia una experiencia casi contemplativa.\n\nLejos de una representacion literal, la pieza funciona como sintesis: objeto, espacio y tiempo quedan comprimidos en una imagen de aparente simplicidad, pero de alta carga emocional y conceptual.',
          featured: true
        },
        {
          id: 'cuadro10',
          title: 'Travesia Ignea',
          year: 2026,
          technique: 'Tecnica mixta',
          size: 'Consultar',
          status: 'Disponible',
          image: 'assets/img/works/travesia_ignea.jpeg',
          renderImage: 'assets/blenders/travesia_ignea_blender.png',
          description: 'Pieza de alto contraste cromatico donde una embarcacion oscura atraviesa un entorno de luz incendiada. Amarillos, naranjas y azules se enfrentan en capas superpuestas para construir una escena de tension entre calma aparente y energia latente.\n\nLa figura del barco, tratada con volumen sobrio y contorno firme, funciona como eje estructural dentro de un fondo vibrante y atmosferico. Los reflejos sobre el agua amplifican el movimiento visual y extienden la intensidad luminica hacia la base de la composicion.\n\nLa obra propone una narrativa abierta de desplazamiento y resistencia, apoyada en una pincelada expresiva que privilegia emocion, ritmo y presencia pictorica.',
          featured: true
        }
      ];
      const hiddenWorkIds = new Set(['cuadro1', 'cuadro4']);
      const titleMap = {
        cuadro2: { es: 'Barco azul', en: 'Blue Ship' },
        cuadro3: { es: 'Orilla al atardecer', en: 'Shore at Dusk' },
        cuadro5: { es: 'Caballos', en: 'Horses' },
        cuadro6: { es: 'El Padrino', en: 'The Godfather' },
        cuadro7: { es: 'Luz Interna', en: 'Inner Light' },
        cuadro8: { es: 'Rayo Verde', en: 'Green Ray' },
        cuadro9: { es: 'Honda CRX', en: 'Honda CRX' },
        cuadro10: { es: 'Travesia Ignea', en: 'Igneous Crossing' }
      };
      const modelMap = {
        cuadro2: {
          model: '../assets/blenders/cuadro_barco_3d.glb?v=1'
        },
        cuadro3: {
          model: '../assets/blenders/cuadro_atardecer_3d.glb?v=1'
        },
        cuadro5: {
          model: '../assets/blenders/cuadro_caballos_3d_front.glb?v=1'
        },
        cuadro6: {
          model: '../assets/blenders/cuadro_retrato_3d.glb?v=1',
          texture: '../assets/blenders/cuadro6.png'
        },
        cuadro8: {
          model: '../assets/blenders/cuadro_retrato_3d.glb?v=1',
          texture: '../assets/blenders/rayo_verde_blender.png'
        },
        cuadro9: {
          model: '../assets/blenders/cuadro_london_eye_3d.glb?v=1',
          texture: '../assets/blenders/honda_crx_blender.png'
        },
        cuadro10: {
          model: '../assets/blenders/cuadro_retrato_3d.glb?v=1',
          texture: '../assets/blenders/travesia_ignea_blender.png'
        }
      };
      const techniqueMap = {
        'Pastel': { es: 'Pastel', en: 'Pastel' },
        'Tecnica mixta': { es: 'Tecnica mixta', en: 'Mixed media' }
      };
      const statusMap = {
        'Disponible': { es: 'Disponible', en: 'Available' }
      };
      function tValue(map, key) {
        return (map[key] && map[key][lang]) || key;
      }

      async function loadWorks() {
        if (window.location.protocol === 'file:') {
          return fallbackWorks;
        }

        try {
          const res = await fetch('../data/works.json', { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (Array.isArray(data) && data.length) return data;
        } catch (error) {
          console.warn('[Work] No se pudo cargar works.json, uso fallback local.', error);
        }

        return fallbackWorks;
      }

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const works = (await loadWorks()).filter((w) => !hiddenWorkIds.has(w.id));
      const work = works.find(w => w.id === id) || works[0];
      if (!work) return;

      const localizedTitle = tValue(titleMap, work.id);
      const localizedTechnique = tValue(techniqueMap, work.technique);
      const localizedStatus = tValue(statusMap, work.status);

      document.getElementById('workTitle').textContent = localizedTitle;
      document.getElementById('workMeta').textContent = `${localizedTechnique} - ${work.size} - ${localizedStatus}`;
      document.getElementById('workYear').textContent = String(work.year);
      const descriptionWrap = document.getElementById('workDescription');
      if (descriptionWrap) {
        const descriptionParts = String(work.description || '')
          .split(/\n{2,}/)
          .map((part) => part.trim())
          .filter(Boolean);

        descriptionWrap.innerHTML = descriptionParts
          .map((part) => `<p>${part}</p>`)
          .join('');
      }

      const img = document.getElementById('workImage');
      const modelWrap = document.getElementById('workModelWrap');
      const modelViewer = document.getElementById('workModel');
      img.src = `../${work.image}`;
      img.alt = localizedTitle;

      const modelConfig = modelMap[work.id];
      if (modelConfig && img) {
        // Mantiene la imagen visible en la ficha y deja el 3D para la lupa.
        img.dataset.modelSrc = modelConfig.model;
        if (modelConfig.texture) img.dataset.modelTexture = modelConfig.texture;
        img.dataset.modelCameraOrbit = '210deg 82deg 125%';
        img.dataset.modelMinCameraOrbit = 'auto 65deg 80%';
        img.dataset.modelMaxCameraOrbit = 'auto 95deg 220%';
      }

      if (modelWrap) modelWrap.hidden = true;
      if (modelViewer) {
        modelViewer.removeAttribute('src');
        modelViewer.removeAttribute('poster');
      }
      img.style.removeProperty('display');
    })();
  </script>
</body>
</html>
