<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Museo | J. Pedrero Studio</title>
  <meta name="description" content="Recorre una sala virtual y visualiza las obras en formato museo." />
  <meta name="theme-color" content="#f6f6f4" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/site/icon-jp.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="../index.html" aria-label="Inicio">
        <span class="brand-main">J. PEDRERO</span>
        <span class="brand-sub">Studio</span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav" aria-label="Navegacion principal">
        <a href="../works/index.html">Obras</a>
        <a href="../visualizer/index.html">Visualizador</a>
        <a href="index.html">Museo</a>
        <a href="../collections/index.html">Colecciones</a>
        <a href="../about/index.html">Sobre</a>
        <a href="../commissions/index.html">Encargos</a>
        <a class="nav-cta" href="../contact/index.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="museum-main">
    <section class="museum-full museum-layout">
      <article class="museum-stage-card">
        <div class="museum-viewport" id="museumViewport" aria-label="Museo 3D"></div>

        <div class="museum-hud is-active" id="museumHud">
          <p id="museumHudText">WASD o flechas para moverte · Arrastra con raton o dedo para mirar · ESC para salir</p>
        </div>

        <aside class="museum-info" id="museumInfo" hidden>
          <button class="museum-info-close" id="museumInfoClose" aria-label="Cerrar ficha">&times;</button>
          <p class="museum-info-kicker">Ficha</p>
          <h3 class="museum-info-title" id="museumInfoTitle">Obra</h3>
          <p class="museum-info-meta" id="museumInfoMeta"></p>
          <p class="museum-info-text" id="museumInfoText"></p>
          <a class="museum-info-link" id="museumInfoLink" href="../works/obra.html" target="_self">Ver ficha completa</a>
        </aside>

        <div class="museum-joystick" id="museumJoystick" aria-label="Joystick de movimiento">
          <span class="museum-joystick-thumb" id="museumJoystickThumb"></span>
          <span class="museum-joystick-label" id="museumJoystickLabel">Mover</span>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <span class="fineprint">&copy; <span id="year"></span> J. Pedrero Studio</span>
      <a class="link fineprint" href="../index.html">Inicio</a>
    </div>
  </footer>

  <script src="../assets/js/main.js?v=20260329-2"></script>
  <script src="../assets/js/vendor/three.min.js?v=20260329-1"></script>
  <script src="../assets/js/museum-inline-images.js?v=20260329-1"></script>
  <script src="../assets/js/museum.js?v=20260403-24"></script>
</body>
</html>
